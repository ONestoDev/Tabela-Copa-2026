<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="app-version" content="__APP_BUILD_VERSION__">
  <title>Copa do Mundo 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title-kicker">FIFA World Cup 2026</div>
    <h1 class="title-cup">Copa do Mundo FIFA 2026 <span class="cup-icon" aria-hidden="true">&#127942;</span></h1>
    <p>Acompanhe a competição em tempo real</p>
    <div class="hero-stats" id="heroStats"></div>
  </div>

  <div class="live-panel" id="livePanel"></div>

  <div class="toolbar">
    <div class="sync-panel">
      <span id="syncStatus" class="sync-status is-idle">Salvo</span>
      <button id="syncNowBtn" class="secondary sync-btn" type="button">Sincronizar</button>
    </div>
    <div class="theme-switch" aria-label="Mudar tema">
      <button class="theme-btn" type="button" data-theme-option="dark">Escuro</button>
      <button class="theme-btn" type="button" data-theme-option="brasil">Brasil</button>
      <button class="theme-btn" type="button" data-theme-option="campeao">Campe&atilde;o</button>
    </div>
    <details class="settings-menu">
      <summary>Configurações</summary>
      <div class="toolbar-actions">
        <button id="exportBtn" class="secondary">Exportar JSON</button>
        <label>
          <input id="fileIn" type="file" accept="application/json">
          <button id="importBtn" class="secondary">Importar JSON</button>
        </label>
        <button id="resetBtn" class="secondary">Limpar tudo</button>
      </div>
    </details>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="jogos">Jogos</button>
    <button class="tab-btn" data-tab="resultados">Resultados</button>
    <button class="tab-btn" data-tab="tabela">Tabela</button>
    <button class="tab-btn" data-tab="palpites">Palpites</button>
    <button class="tab-btn" data-tab="mata-mata">Mata-Mata</button>
    <button class="tab-btn" data-tab="estatisticas">Estatísticas gerais</button>
  </div>

  <div class="tab-content active" id="jogos">
    <div id="jogosContent"></div>
  </div>

  <div class="tab-content" id="resultados">
    <div id="resultadosContent"></div>
  </div>

  <div class="tab-content" id="palpites">
    <div class="subtabs" aria-label="Seções de palpites">
      <button class="subtab-btn active" type="button" data-subtab="palpites-grupos-panel">Fase de grupos</button>
      <button class="subtab-btn" type="button" data-subtab="palpites-mata-mata-panel">Mata-mata</button>
      <button class="subtab-btn" type="button" data-subtab="palpites-ranking-panel">Ranking geral</button>
    </div>
    <div class="subtab-content active" id="palpites-grupos-panel">
      <div id="palpitesContent"></div>
    </div>
    <div class="subtab-content" id="palpites-mata-mata-panel">
      <div id="palpitesMataMataContent"></div>
    </div>
    <div class="subtab-content" id="palpites-ranking-panel">
      <div id="palpitesRankingContent"></div>
    </div>
  </div>

  <div class="tab-content" id="tabela">
    <div id="tabelaContent"></div>
  </div>

  <div class="tab-content" id="mata-mata">
    <div id="mataMataContent"></div>
    <div class="note">
      Os 8 melhores terceiros colocados acessam a rodada de 32. O encaixe segue a lógica oficial FIFA.
    </div>
  </div>
  <div class="tab-content" id="estatisticas">
    <div class="subtabs" aria-label="Seções de estatísticas gerais">
      <button class="subtab-btn active" type="button" data-subtab="stats-artilharia-panel">Artilharia</button>
      <button class="subtab-btn" type="button" data-subtab="stats-assistencias-panel">Assistência</button>
      <button class="subtab-btn" type="button" data-subtab="stats-desempenho-panel">Desempenho</button>
      <button class="subtab-btn" type="button" data-subtab="stats-gols-panel">Gols marcados e sofridos</button>
      <button class="subtab-btn" type="button" data-subtab="stats-invictas-panel">Invictas</button>
      <button class="subtab-btn" type="button" data-subtab="stats-goleada-panel">Maior goleada</button>
      <button class="subtab-btn" type="button" data-subtab="stats-usuarios-panel">Estat&iacute;sticas dos usu&aacute;rios</button>
      <button class="subtab-btn" type="button" data-subtab="stats-campeas-panel">Campe&atilde;s</button>
    </div>
    <div class="subtab-content active" id="stats-artilharia-panel"></div>
    <div class="subtab-content" id="stats-assistencias-panel"></div>
    <div class="subtab-content" id="stats-desempenho-panel"></div>
    <div class="subtab-content" id="stats-gols-panel"></div>
    <div class="subtab-content" id="stats-invictas-panel"></div>
    <div class="subtab-content" id="stats-goleada-panel"></div>
    <div class="subtab-content" id="stats-usuarios-panel"></div>
    <div class="subtab-content" id="stats-campeas-panel"></div>
  </div>
</div>

<script>
  window.APP_BUILD_VERSION = '__APP_BUILD_VERSION__';
  (function () {
    try {
      var version = window.APP_BUILD_VERSION;
      if(!version || version.indexOf('__') === 0) return;
      var key = 'copa2026-app-version';
      var previousVersion = localStorage.getItem(key);
      if(previousVersion && previousVersion !== version && window.caches) {
        window.caches.keys().then(function (keys) {
          return Promise.all(keys.map(function (cacheKey) {
            return window.caches.delete(cacheKey);
          }));
        });
      }
      localStorage.setItem(key, version);
    } catch (error) {}
  })();
</script>
<script src="js/data/worldCupData.js"></script>
<script src="js/data/thirdPlaceCombinations.js"></script>
<script src="js/core/appState.js"></script>
<script src="js/core/appController.js"></script>
<script src="js/core/scoresController.js"></script>
<script src="js/core/predictionsController.js"></script>
<script src="js/core/overviewController.js"></script>
<script src="js/core/uiHelpers.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/services/predictionService.js"></script>
<script src="js/services/storageService.js"></script>
<script src="js/services/standingsService.js"></script>
<script src="js/services/knockoutService.js"></script>
<script src="js/services/footballApiService.js"></script>
<script src="js/renderers/heroRenderer.js"></script>
<script src="js/renderers/resultsRenderer.js"></script>
<script src="js/renderers/standingsRenderer.js"></script>
<script src="js/renderers/predictionsRenderer.js"></script>
<script src="js/renderers/matchesRenderer.js"></script>
<script src="js/renderers/knockoutRenderer.js"></script>
<script src="js/renderers/livePanelRenderer.js"></script>
<script src="js/renderers/statisticsRenderer.js"></script>
<script src="js/core/statisticsController.js"></script>
<script src="js/app.js"></script>
</body>
</html>
