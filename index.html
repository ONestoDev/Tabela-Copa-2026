<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copa do Mundo 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1 class="title-cup">Copa do Mundo FIFA 2026 <span class="cup-icon" aria-hidden="true">&#127942;</span></h1>
    <p>Acompanhe a competição em tempo real</p>
    <div class="hero-stats" id="heroStats"></div>
  </div>

  <div class="toolbar">
    <button id="exportBtn">&#128229; Exportar JSON</button>
    <label>
      <input id="fileIn" type="file" accept="application/json">
      <button id="importBtn" class="secondary">&#128228; Importar JSON</button>
    </label>
    <button id="resetBtn" class="secondary">&#128260; Limpar tudo</button>
    <div class="theme-switch" aria-label="Mudar tema">
      <button class="theme-btn" type="button" data-theme-option="dark">Escuro</button>
      <button class="theme-btn" type="button" data-theme-option="light">Claro</button>
      <button class="theme-btn" type="button" data-theme-option="brasil">Brasil</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="jogos">Jogos</button>
    <button class="tab-btn" data-tab="resultados">Resultados</button>
    <button class="tab-btn" data-tab="tabela">Tabela</button>
    <button class="tab-btn" data-tab="palpites">Palpites Fase de Grupos</button>
    <button class="tab-btn" data-tab="palpites-mata-mata">Palpites Mata-Mata</button>
    <button class="tab-btn" data-tab="mata-mata">Mata-Mata</button>
  </div>

  <div class="tab-content active" id="jogos">
    <div id="jogosContent"></div>
  </div>

  <div class="tab-content" id="resultados">
    <div id="resultadosContent"></div>
  </div>

  <div class="tab-content" id="palpites">
    <div id="palpitesContent"></div>
  </div>

  <div class="tab-content" id="palpites-mata-mata">
    <div id="palpitesMataMataContent"></div>
  </div>

  <div class="tab-content" id="tabela">
    <div id="tabelaContent"></div>
  </div>

  <div class="tab-content" id="mata-mata">
    <div id="mataMatoContent"></div>
    <div class="note">
      Os 8 melhores terceiros colocados acessam a rodada de 32. O encaixe segue a lógica oficial FIFA.
    </div>
  </div>
</div>

<script src="js/data/worldCupData.js"></script>
<script src="js/core/appState.js"></script>
<script src="js/core/uiHelpers.js"></script>
<script src="js/services/predictionService.js"></script>
<script src="js/services/standingsService.js"></script>
<script src="js/services/knockoutService.js"></script>
<script src="js/renderers/heroRenderer.js"></script>
<script src="js/renderers/resultsRenderer.js"></script>
<script src="js/renderers/standingsRenderer.js"></script>
<script>
  const {
    TEAMS,
    COUNTRY_CODES,
    GROUPS,
    matches,
    matchDates,
    RESULT_PHASES,
    KNOCKOUT_MATCHES,
    KNOCKOUT_PHASES
  } = window.WorldCupData;
  const { predictionPoints } = window.PredictionService;
  const {
    getTeamName,
    getCountryCode,
    getFlagUrl,
    escapeHtml,
    scoreComplete,
    matchStateClass,
    predictionStateClass,
    winnerClass
  } = window.UiHelpers.create({
    teams: TEAMS,
    countryCodes: COUNTRY_CODES
  });
  const standingsService = window.StandingsService.create({
    teams: TEAMS,
    matches,
    groups: GROUPS,
    scoreComplete
  });
  const knockoutService = window.KnockoutService.create({
    matches: KNOCKOUT_MATCHES,
    standingsService,
    scoreComplete
  });

  const state = window.AppState.createInitialState();

  function save(){ window.AppState.save(state); }
  function applyTheme(){
    state.theme = ['dark', 'light', 'brasil'].includes(state.theme) ? state.theme : 'dark';
    document.body.dataset.theme = state.theme;
    document.querySelectorAll('[data-theme-option]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.themeOption === state.theme);
    });
  }
  function pushHistory(){
    state.history.push(window.AppState.clone({scores:state.scores, knockoutScores:state.knockoutScores, predictions:state.predictions, knockoutPredictions:state.knockoutPredictions, users:state.users, activeUser:state.activeUser, theme:state.theme, resultsFilter:state.resultsFilter, thirds:state.thirds}));
    if(state.history.length > 50) state.history.shift();
    state.future = [];
    save();
  }
  function normalizeState(){
    state.scores = state.scores || {};
    state.knockoutScores = state.knockoutScores || {};
    state.predictions = state.predictions || {};
    state.knockoutPredictions = state.knockoutPredictions || {};
    state.users = Array.isArray(state.users) && state.users.length ? state.users : ['Usuário 1'];
    state.activeUser = state.users.includes(state.activeUser) ? state.activeUser : state.users[0];
    state.theme = ['dark', 'light', 'brasil'].includes(state.theme) ? state.theme : 'dark';
    state.resultsFilter = RESULT_PHASES.some(phase => phase.value === state.resultsFilter) ? state.resultsFilter : 'all';
    state.users.forEach(user => {
      state.predictions[user] = state.predictions[user] || {};
      state.knockoutPredictions[user] = state.knockoutPredictions[user] || {};
    });
  }
  function restore(s){
    state.scores = s.scores || {};
    state.knockoutScores = s.knockoutScores || {};
    state.predictions = s.predictions || {};
    state.knockoutPredictions = s.knockoutPredictions || {};
    state.users = s.users || ['Usuário 1'];
    state.activeUser = s.activeUser || state.users[0];
    state.theme = s.theme || 'dark';
    state.resultsFilter = s.resultsFilter || 'all';
    state.thirds = s.thirds || [];
    normalizeState();
    render();
    save();
  }

  function userPredictionTotal(user){
    const predictions = state.predictions[user] || {};
    return GROUPS.reduce((sum, g) => {
      return sum + matches[g].reduce((groupSum, pair, i) => {
        const key = `${g}${i+1}`;
        return groupSum + (predictionPoints(predictions[key], state.scores[key]) || 0);
      }, 0);
    }, 0);
  }

  function userKnockoutPredictionTotal(user){
    const predictions = state.knockoutPredictions[user] || {};
    return KNOCKOUT_MATCHES.reduce((sum, match) => {
      return sum + (predictionPoints(predictions[match.id], state.knockoutScores[match.id]) || 0);
    }, 0);
  }

  function allMatches(){
    return GROUPS.flatMap(g => matches[g].map((pair, i) => ({group:g, index:i, key:`${g}${i+1}`, pair})));
  }

  function buildHeroStats(){
    const items = allMatches();
    const completed = items.filter(item => scoreComplete(state.scores[item.key]));
    const goals = completed.reduce((sum, item) => sum + Number(state.scores[item.key].a) + Number(state.scores[item.key].b), 0);
    const leader = state.users
      .map(user => ({user, points:userPredictionTotal(user)}))
      .sort((a,b) => b.points-a.points || a.user.localeCompare(b.user))[0];
    const next = items.find(item => !scoreComplete(state.scores[item.key]));
    const nextLabel = next ? `${getTeamName(next.pair[0])} x ${getTeamName(next.pair[1])}` : 'Tabela completa';
    window.HeroRenderer.render(document.getElementById('heroStats'), {
      completedMatches: completed.length,
      totalMatches: items.length,
      goals,
      leaderName: leader?.user,
      nextMatchLabel: nextLabel,
      escapeHtml
    });
  }

  function buildJogos(){
    let html = '';
    GROUPS.forEach(g => {
      html += `<div class="group-section">
        <div class="group-header">
          <div class="group-title">Grupo ${g}</div>
        </div>`;
      matches[g].forEach((m, i) => {
        const k = `${g}${i+1}`;
        const v = state.scores[k] || {a:'', b:''};
        const team1 = getTeamName(m[0]);
        const team2 = getTeamName(m[1]);
        const date = matchDates[g][i];
        html += `
        <div class="match-card ${matchStateClass(v)}">
          <div class="team-slot${winnerClass(v, 'a')}">
            <div class="flag" style="background-image:url('${getFlagUrl(team1)}')"></div>
            <div class="team-info">
              <div class="team-name">${team1}</div>
              <div class="team-code">${m[0]}</div>
            </div>
          </div>
          <div class="score-box">
            <div class="match-date">${date}</div>
            <div class="score-line">
              <input class="score-input" type="number" min="0" max="99" data-score="${k}-a" value="${v.a === '' ? '' : v.a}" placeholder="0">
              <div class="score-sep">:</div>
              <input class="score-input" type="number" min="0" max="99" data-score="${k}-b" value="${v.b === '' ? '' : v.b}" placeholder="0">
            </div>
          </div>
          <div class="team-slot${winnerClass(v, 'b')}" style="flex-direction:row-reverse;text-align:right">
            <div class="flag" style="background-image:url('${getFlagUrl(team2)}')"></div>
            <div class="team-info" style="align-items:flex-end">
              <div class="team-name">${team2}</div>
              <div class="team-code">${m[1]}</div>
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
    document.getElementById('jogosContent').innerHTML = html;
    document.querySelectorAll('input[data-score]').forEach(inp => inp.addEventListener('input', onScoreInput));
  }

  function onScoreInput(e){
    const [matchKey, side] = e.target.dataset.score.split('-');
    state.scores[matchKey] = state.scores[matchKey] || {a:'',b:''};
    state.scores[matchKey][side] = e.target.value;
    pushHistory();
    renderPreservingPosition(e.target.dataset.score);
  }

  function renderPreservingPosition(scoreKey, koScoreKey){
    const scrollX = window.scrollX;
    const scrollY = window.scrollY;
    render();
    requestAnimationFrame(() => {
      window.scrollTo(scrollX, scrollY);
      const selector = scoreKey ? `[data-score="${scoreKey}"]` : `[data-ko-score="${koScoreKey}"]`;
      const input = document.querySelector(selector);
      if(input) {
        input.focus({preventScroll:true});
        const len = input.value.length;
        input.setSelectionRange(len, len);
      }
    });
  }

  function groupStanding(g){
    return standingsService.groupStanding(g, state.scores);
  }

  function sortTable(a, b){
    return standingsService.sortTable(a, b);
  }

  function buildTabela(){
    const standingsByGroup = {};
    GROUPS.forEach(g => {
      standingsByGroup[g] = groupStanding(g);
    });
    const thirds = GROUPS
      .map(g => groupStanding(g)[2])
      .filter(Boolean)
      .sort(sortTable);
    window.StandingsRenderer.render(document.getElementById('tabelaContent'), {
      groups: GROUPS,
      standingsByGroup,
      thirds,
      getFlagUrl
    });
  }

  function thirdPlaceRank(){
    return standingsService.thirdPlaceRank(state.scores);
  }

  function groupComplete(g){
    return standingsService.groupComplete(g, state.scores);
  }

  function placeholderForSpec(spec){
    return knockoutService.placeholderForSpec(spec);
  }

  function resolveSpec(spec){
    return knockoutService.resolveSpec(spec, state.scores, state.knockoutScores);
  }

  function knockoutMatch(id){
    return knockoutService.knockoutMatch(id);
  }

  function knockoutResult(id, type){
    return knockoutService.knockoutResult(id, type, state.scores, state.knockoutScores);
  }

  function buildMataMata(){
    let html = '<div class="phase-grid">';
    KNOCKOUT_PHASES.forEach(phase => {
      html += `<div class="group-section">
        <div class="group-header">
          <div class="group-title">${phase.label}</div>
        </div>`;
      KNOCKOUT_MATCHES.filter(match => match.phase === phase.value).forEach(match => {
        html += renderKnockoutMatch(match);
      });
      html += '</div>';
    });
    html += '</div>';
    document.getElementById('mataMatoContent').innerHTML = html;
    document.querySelectorAll('input[data-ko-score]').forEach(inp => inp.addEventListener('input', onKnockoutScoreInput));
  }

  function renderKnockoutMatch(match){
    const score = state.knockoutScores[match.id] || {a:'', b:''};
    const teamA = resolveSpec(match.a);
    const teamB = resolveSpec(match.b);
    const isAPlaceholder = teamA === placeholderForSpec(match.a);
    const isBPlaceholder = teamB === placeholderForSpec(match.b);
    return `
      <div class="match-card ${matchStateClass(score)}">
        <div class="team-slot${winnerClass(score, 'a')}">
          ${isAPlaceholder ? '<div class="flag"></div>' : `<div class="flag" style="background-image:url('${getFlagUrl(teamA)}')"></div>`}
          <div class="team-info">
            <div class="team-name">${teamA}</div>
            <div class="team-code">J${match.id}</div>
          </div>
        </div>
        <div class="score-box">
          <div class="match-date">${match.label}</div>
          <div class="score-line">
            <input class="score-input" type="number" min="0" max="99" data-ko-score="${match.id}-a" value="${score.a === '' ? '' : score.a}" placeholder="0">
            <div class="score-sep">:</div>
            <input class="score-input" type="number" min="0" max="99" data-ko-score="${match.id}-b" value="${score.b === '' ? '' : score.b}" placeholder="0">
          </div>
        </div>
        <div class="team-slot${winnerClass(score, 'b')}" style="flex-direction:row-reverse;text-align:right">
          ${isBPlaceholder ? '<div class="flag"></div>' : `<div class="flag" style="background-image:url('${getFlagUrl(teamB)}')"></div>`}
          <div class="team-info" style="align-items:flex-end">
            <div class="team-name">${teamB}</div>
            <div class="team-code">J${match.id}</div>
          </div>
        </div>
      </div>`;
  }

  function onKnockoutScoreInput(e){
    const [matchKey, side] = e.target.dataset.koScore.split('-');
    state.knockoutScores[matchKey] = state.knockoutScores[matchKey] || {a:'', b:''};
    state.knockoutScores[matchKey][side] = e.target.value;
    save();
    renderPreservingPosition(null, e.target.dataset.koScore);
  }

  function buildResultados(){
    window.ResultsRenderer.render(document.getElementById('resultadosContent'), {
      selectedPhase: state.resultsFilter,
      phases: RESULT_PHASES,
      groups: GROUPS,
      matches,
      matchDates,
      groupScores: state.scores,
      knockoutScores: state.knockoutScores,
      knockoutMatches: KNOCKOUT_MATCHES,
      getTeamName,
      getFlagUrl,
      scoreComplete,
      matchStateClass,
      winnerClass,
      resolveSpec,
      placeholderForSpec
    });
    document.getElementById('resultsFilter').addEventListener('change', onResultsFilterChange);
  }

  function onResultsFilterChange(e){
    state.resultsFilter = e.target.value;
    save();
    buildResultados();
  }

  function buildPalpites(){
    normalizeState();
    const activeUser = state.activeUser;
    const userPredictions = state.predictions[activeUser] || {};
    const total = userPredictionTotal(activeUser);
    const options = state.users.map((user, index) => {
      return `<option value="${index}" ${user === activeUser ? 'selected' : ''}>${escapeHtml(user)}</option>`;
    }).join('');
    let html = `<div class="prediction-toolbar">
      <select id="userSelect">${options}</select>
      <input id="newUserName" type="text" maxlength="30" placeholder="Nome do usuário">
      <button id="addUserBtn" class="secondary">Adicionar</button>
      <div class="prediction-score" id="activePredictionScore">${total} pts</div>
    </div>`;

    html += `<div class="group-section">
      <div class="group-header">
        <div class="group-title">Ranking de palpites</div>
      </div>
      <div class="leaderboard-row header">
        <div>#</div>
        <div>Usuário</div>
        <div>Pts</div>
      </div>
      ${state.users
        .map(user => ({user, points:userPredictionTotal(user)}))
        .sort((a,b) => b.points-a.points || a.user.localeCompare(b.user))
        .map((row, index) => `
          <div class="leaderboard-row ${index < 3 ? `top-${index+1}` : ''}">
            <div class="leaderboard-medal">${['1o','2o','3o'][index] || index+1}</div>
            <div class="standings-team">${escapeHtml(row.user)}</div>
            <div class="standings-pts">${row.points}</div>
          </div>`)
        .join('')}
    </div>`;

    GROUPS.forEach(g => {
      html += `<div class="group-section">
        <div class="group-header">
          <div class="group-title">Palpites - Grupo ${g}</div>
        </div>`;
      matches[g].forEach((m, i) => {
        const k = `${g}${i+1}`;
        const pred = userPredictions[k] || {a:'', b:''};
        const result = state.scores[k];
        const points = predictionPoints(pred, result);
        const team1 = getTeamName(m[0]);
        const team2 = getTeamName(m[1]);
        const date = matchDates[g][i];
        html += `
        <div class="match-card ${predictionStateClass(points)}">
          <div class="team-slot${winnerClass(result, 'a')}">
            <div class="flag" style="background-image:url('${getFlagUrl(team1)}')"></div>
            <div class="team-info">
              <div class="team-name">${team1}</div>
              <div class="team-code">${m[0]}</div>
            </div>
          </div>
          <div class="score-box">
            <div class="match-date">${date}</div>
            <div class="score-line">
              <input class="score-input" type="number" min="0" max="99" data-pred="${k}-a" value="${pred.a === '' ? '' : pred.a}" placeholder="0">
              <div class="score-sep">:</div>
              <input class="score-input" type="number" min="0" max="99" data-pred="${k}-b" value="${pred.b === '' ? '' : pred.b}" placeholder="0">
            </div>
            <div class="prediction-points" data-pred-points="${k}">${points === null ? '-' : `${points} pts`}</div>
          </div>
          <div class="team-slot${winnerClass(result, 'b')}" style="flex-direction:row-reverse;text-align:right">
            <div class="flag" style="background-image:url('${getFlagUrl(team2)}')"></div>
            <div class="team-info" style="align-items:flex-end">
              <div class="team-name">${team2}</div>
              <div class="team-code">${m[1]}</div>
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    });

    document.getElementById('palpitesContent').innerHTML = html;
    document.getElementById('userSelect').addEventListener('change', onUserSelect);
    document.getElementById('addUserBtn').addEventListener('click', onAddUser);
    document.querySelectorAll('input[data-pred]').forEach(inp => {
      inp.addEventListener('input', onPredictionInput);
      inp.addEventListener('change', render);
    });
  }

  function buildPalpitesMataMata(){
    normalizeState();
    const activeUser = state.activeUser;
    const userPredictions = state.knockoutPredictions[activeUser] || {};
    const total = userKnockoutPredictionTotal(activeUser);
    const options = state.users.map((user, index) => {
      return `<option value="${index}" ${user === activeUser ? 'selected' : ''}>${escapeHtml(user)}</option>`;
    }).join('');
    let html = `<div class="prediction-toolbar">
      <select id="koUserSelect">${options}</select>
      <input id="koNewUserName" type="text" maxlength="30" placeholder="Nome do usuário">
      <button id="koAddUserBtn" class="secondary">Adicionar</button>
      <div class="prediction-score" id="activeKoPredictionScore">${total} pts</div>
    </div>`;

    html += `<div class="group-section">
      <div class="group-header">
        <div class="group-title">Ranking de palpites - Mata-Mata</div>
      </div>
      <div class="leaderboard-row header">
        <div>#</div>
        <div>Usuário</div>
        <div>Pts</div>
      </div>
      ${state.users
        .map(user => ({user, points:userKnockoutPredictionTotal(user)}))
        .sort((a,b) => b.points-a.points || a.user.localeCompare(b.user))
        .map((row, index) => `
          <div class="leaderboard-row ${index < 3 ? `top-${index+1}` : ''}">
            <div class="leaderboard-medal">${['1o','2o','3o'][index] || index+1}</div>
            <div class="standings-team">${escapeHtml(row.user)}</div>
            <div class="standings-pts">${row.points}</div>
          </div>`)
        .join('')}
    </div>`;

    KNOCKOUT_PHASES.forEach(phase => {
      html += `<div class="group-section">
        <div class="group-header">
          <div class="group-title">Palpites - ${phase.label}</div>
        </div>`;
      KNOCKOUT_MATCHES.filter(match => match.phase === phase.value).forEach(match => {
        html += renderKnockoutPredictionMatch(match, userPredictions);
      });
      html += '</div>';
    });

    document.getElementById('palpitesMataMataContent').innerHTML = html;
    document.getElementById('koUserSelect').addEventListener('change', onUserSelect);
    document.getElementById('koAddUserBtn').addEventListener('click', onAddKnockoutUser);
    document.querySelectorAll('input[data-ko-pred]').forEach(inp => {
      inp.addEventListener('input', onKnockoutPredictionInput);
      inp.addEventListener('change', render);
    });
  }

  function renderKnockoutPredictionMatch(match, userPredictions){
    const pred = userPredictions[match.id] || {a:'', b:''};
    const result = state.knockoutScores[match.id];
    const points = predictionPoints(pred, result);
    const teamA = resolveSpec(match.a);
    const teamB = resolveSpec(match.b);
    const isAPlaceholder = teamA === placeholderForSpec(match.a);
    const isBPlaceholder = teamB === placeholderForSpec(match.b);
    return `
      <div class="match-card ${predictionStateClass(points)}">
        <div class="team-slot${winnerClass(result, 'a')}">
          ${isAPlaceholder ? '<div class="flag"></div>' : `<div class="flag" style="background-image:url('${getFlagUrl(teamA)}')"></div>`}
          <div class="team-info">
            <div class="team-name">${teamA}</div>
            <div class="team-code">J${match.id}</div>
          </div>
        </div>
        <div class="score-box">
          <div class="match-date">${match.label}</div>
          <div class="score-line">
            <input class="score-input" type="number" min="0" max="99" data-ko-pred="${match.id}-a" value="${pred.a === '' ? '' : pred.a}" placeholder="0">
            <div class="score-sep">:</div>
            <input class="score-input" type="number" min="0" max="99" data-ko-pred="${match.id}-b" value="${pred.b === '' ? '' : pred.b}" placeholder="0">
          </div>
          <div class="prediction-points" data-ko-pred-points="${match.id}">${points === null ? '-' : `${points} pts`}</div>
        </div>
        <div class="team-slot${winnerClass(result, 'b')}" style="flex-direction:row-reverse;text-align:right">
          ${isBPlaceholder ? '<div class="flag"></div>' : `<div class="flag" style="background-image:url('${getFlagUrl(teamB)}')"></div>`}
          <div class="team-info" style="align-items:flex-end">
            <div class="team-name">${teamB}</div>
            <div class="team-code">J${match.id}</div>
          </div>
        </div>
      </div>`;
  }

  function onUserSelect(e){
    state.activeUser = state.users[Number(e.target.value)] || state.users[0];
    normalizeState();
    save();
    render();
  }

  function onAddUser(){
    const input = document.getElementById('newUserName');
    const name = input.value.trim();
    if(!name) return;
    if(!state.users.includes(name)) state.users.push(name);
    state.activeUser = name;
    normalizeState();
    save();
    render();
  }

  function onAddKnockoutUser(){
    const input = document.getElementById('koNewUserName');
    const name = input.value.trim();
    if(!name) return;
    if(!state.users.includes(name)) state.users.push(name);
    state.activeUser = name;
    normalizeState();
    save();
    render();
  }

  function onPredictionInput(e){
    const [matchKey, side] = e.target.dataset.pred.split('-');
    const user = state.activeUser;
    state.predictions[user] = state.predictions[user] || {};
    state.predictions[user][matchKey] = state.predictions[user][matchKey] || {a:'', b:''};
    state.predictions[user][matchKey][side] = e.target.value;
    save();
    const points = predictionPoints(state.predictions[user][matchKey], state.scores[matchKey]);
    const pointsEl = document.querySelector(`[data-pred-points="${matchKey}"]`);
    if(pointsEl) pointsEl.textContent = points === null ? '-' : `${points} pts`;
    const scoreEl = document.getElementById('activePredictionScore');
    if(scoreEl) scoreEl.textContent = `${userPredictionTotal(user)} pts`;
  }

  function onKnockoutPredictionInput(e){
    const [matchKey, side] = e.target.dataset.koPred.split('-');
    const user = state.activeUser;
    state.knockoutPredictions[user] = state.knockoutPredictions[user] || {};
    state.knockoutPredictions[user][matchKey] = state.knockoutPredictions[user][matchKey] || {a:'', b:''};
    state.knockoutPredictions[user][matchKey][side] = e.target.value;
    save();
    const points = predictionPoints(state.knockoutPredictions[user][matchKey], state.knockoutScores[matchKey]);
    const pointsEl = document.querySelector(`[data-ko-pred-points="${matchKey}"]`);
    if(pointsEl) pointsEl.textContent = points === null ? '-' : `${points} pts`;
    const scoreEl = document.getElementById('activeKoPredictionScore');
    if(scoreEl) scoreEl.textContent = `${userKnockoutPredictionTotal(user)} pts`;
  }

  function render(){
    normalizeState();
    applyTheme();
    buildHeroStats();
    buildJogos();
    buildTabela();
    buildResultados();
    buildPalpites();
    buildPalpitesMataMata();
    buildMataMata();
    save();
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  document.querySelectorAll('[data-theme-option]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.theme = btn.dataset.themeOption;
      applyTheme();
      save();
    });
  });

  document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'copa2026-dados.json';
    a.click();
  };

  document.getElementById('importBtn').onclick = () => document.getElementById('fileIn').click();
  document.getElementById('fileIn').onchange = async e => {
    const f = e.target.files[0];
    if(!f) return;
    const txt = await f.text();
    restore(JSON.parse(txt));
  };

  document.getElementById('resetBtn').onclick = () => {
    if(confirm('Tem certeza que quer limpar todos os dados?')) {
      state.scores = {};
      state.knockoutScores = {};
      state.predictions = {};
      state.knockoutPredictions = {};
      state.users = ['Usuário 1'];
      state.activeUser = 'Usuário 1';
      state.resultsFilter = 'all';
      state.thirds = [];
      state.history = [];
      state.future = [];
      save();
      render();
    }
  };

  try{
    const saved = window.AppState.load();
    if(saved && typeof saved === 'object') restore(saved);
  }catch(e){}
  render();
</script>
</body>
</html>
