<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="app-version" content="__APP_BUILD_VERSION__">
  <title>Copa do Mundo 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1 class="title-cup">Copa do Mundo FIFA 2026 <span class="cup-icon" aria-hidden="true">&#127942;</span></h1>
    <p>Acompanhe a competição em tempo real</p>
    <div class="hero-stats" id="heroStats"></div>
  </div>

  <div class="toolbar">
    <button id="exportBtn">&#128229; Exportar JSON</button>
    <label>
      <input id="fileIn" type="file" accept="application/json">
      <button id="importBtn" class="secondary">&#128228; Importar JSON</button>
    </label>
    <button id="resetBtn" class="secondary">&#128260; Limpar tudo</button>
    <div class="sync-panel">
      <span id="syncStatus" class="sync-status is-idle">Salvo</span>
      <button id="syncNowBtn" class="secondary sync-btn" type="button">Sincronizar</button>
    </div>
    <div class="theme-switch" aria-label="Mudar tema">
      <button class="theme-btn" type="button" data-theme-option="dark">Escuro</button>
      <button class="theme-btn" type="button" data-theme-option="brasil">Brasil</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="jogos">Jogos</button>
    <button class="tab-btn" data-tab="resultados">Resultados</button>
    <button class="tab-btn" data-tab="tabela">Tabela</button>
    <button class="tab-btn" data-tab="palpites">Palpites Fase de Grupos</button>
    <button class="tab-btn" data-tab="palpites-mata-mata">Palpites Mata-Mata</button>
    <button class="tab-btn" data-tab="mata-mata">Mata-Mata</button>
  </div>

  <div class="tab-content active" id="jogos">
    <div id="jogosContent"></div>
  </div>

  <div class="tab-content" id="resultados">
    <div id="resultadosContent"></div>
  </div>

  <div class="tab-content" id="palpites">
    <div id="palpitesContent"></div>
  </div>

  <div class="tab-content" id="palpites-mata-mata">
    <div id="palpitesMataMataContent"></div>
  </div>

  <div class="tab-content" id="tabela">
    <div id="tabelaContent"></div>
  </div>

  <div class="tab-content" id="mata-mata">
    <div id="mataMataContent"></div>
    <div class="note">
      Os 8 melhores terceiros colocados acessam a rodada de 32. O encaixe segue a lógica oficial FIFA.
    </div>
  </div>
</div>

<script>
  window.APP_BUILD_VERSION = '__APP_BUILD_VERSION__';
  (function () {
    try {
      var version = window.APP_BUILD_VERSION;
      if(!version || version.indexOf('__') === 0) return;
      var key = 'copa2026-app-version';
      var previousVersion = localStorage.getItem(key);
      if(previousVersion && previousVersion !== version && window.caches) {
        window.caches.keys().then(function (keys) {
          return Promise.all(keys.map(function (cacheKey) {
            return window.caches.delete(cacheKey);
          }));
        });
      }
      localStorage.setItem(key, version);
    } catch (error) {}
  })();
</script>
<script src="js/data/worldCupData.js"></script>
<script src="js/data/thirdPlaceCombinations.js"></script>
<script src="js/core/appState.js"></script>
<script src="js/core/appController.js"></script>
<script src="js/core/scoresController.js"></script>
<script src="js/core/predictionsController.js"></script>
<script src="js/core/overviewController.js"></script>
<script src="js/core/uiHelpers.js"></script>
<script src="js/services/predictionService.js"></script>
<script src="js/services/storageService.js"></script>
<script src="js/services/standingsService.js"></script>
<script src="js/services/knockoutService.js"></script>
<script src="js/renderers/heroRenderer.js"></script>
<script src="js/renderers/resultsRenderer.js"></script>
<script src="js/renderers/standingsRenderer.js"></script>
<script src="js/renderers/predictionsRenderer.js"></script>
<script src="js/renderers/matchesRenderer.js"></script>
<script src="js/renderers/knockoutRenderer.js"></script>
<script src="js/app.js"></script>
</body>
</html>
